<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shela Beauty Studio</title>

    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">

    <div class="booking-form">

        <h1>Booking Layanan</h1>
        <p>Silakan isi formulir berikut untuk melakukan reservasi layanan Shela Beauty Studio.</p>

        <form>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" class="form-control" placeholder="08xxxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label>Pilih Layanan</label>
                <select class="form-control" required>
                    <option value="">-- Pilih Layanan --</option>
                    <option>Wedding Makeup</option>
                    <option>Wisuda Makeup</option>
                    <option>Party Makeup</option>
                    <option>Nail Art</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tanggal Booking</label>
                <input type="date" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Jam Booking</label>
                <input type="time" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Alamat / Lokasi Acara</label>
                <textarea class="form-control" rows="3" placeholder="Masukkan lokasi acara"></textarea>
            </div>

            <div class="form-group">
                <label>Catatan Tambahan</label>
                <textarea class="form-control" rows="4" placeholder="Tuliskan permintaan khusus jika ada"></textarea>
            </div>

            <button type="submit" class="btn-booking-form">
                Booking Sekarang
            </button> <br><br>
             
                 
                <ul class="footer-menu">
                    <li><a href="index.html">Kembali Ke Beranda</a></li>
                    
                </ul>
            </button>

        </form>

    </div>

</div>
   
<div class="footer text-center">

    <div class="container">
         
        <p>
            © 2026 Shela Beauty Studio
        </p>

    </div>

</div>

 
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</body>
</html>
